services:
  postgres:
    image: postgres:16-alpine
    container_name: nfse_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nfse
      POSTGRES_PASSWORD: nfse
      POSTGRES_DB: nfse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nfse -d nfse"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
